<svg width="1024" height="1024" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#120a00"/>
  <rect width="120" height="120" fill="none" stroke="#3a2000" stroke-width="1.5"/>

  <!-- Ambient glow -->
  <circle cx="60" cy="36" r="34" fill="url(#glow)" opacity="0.35"/>

  <!-- Document -->
  <rect x="20" y="66" width="80" height="46" rx="5" fill="#1a0e04" stroke="#4a2c08" stroke-width="1.8"/>
  <line x1="30" y1="78" x2="90" y2="78" stroke="#3a2008" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="87" x2="76" y2="87" stroke="#3a2008" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="96" x2="84" y2="96" stroke="#3a2008" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="105" x2="58" y2="105" stroke="#3a2008" stroke-width="2" stroke-linecap="round"/>

  <!-- Dashed launch trail -->
  <line x1="60" y1="64" x2="60" y2="40" stroke="#c07010" stroke-width="1.8"
    stroke-dasharray="3 4" stroke-linecap="round" opacity="0.7"/>

  <!-- Arrow -->
  <path d="M 60 10 L 80 38 L 68 38 L 68 64 L 52 64 L 52 38 L 40 38 Z"
    fill="#1e1000" stroke="url(#arrowstroke)" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 60 14 L 76 38 L 67 38 L 67 62 L 53 62 L 53 38 L 44 38 Z"
    fill="#2a1600"/>
  <path d="M 60 16 L 74 38 L 66 38 L 66 60 L 54 60 L 54 38 L 46 38 Z"
    fill="url(#arrowface)" opacity="0.18"/>

  <!-- Particles -->
  <circle cx="32" cy="30" r="1.8" fill="#e8960a" opacity="0.55"/>
  <circle cx="88" cy="24" r="1.4" fill="#e8960a" opacity="0.38"/>
  <circle cx="42" cy="13" r="1.2" fill="#f5b830" opacity="0.48"/>
  <circle cx="80" cy="42" r="1.3" fill="#e8960a" opacity="0.3"/>
  <circle cx="26" cy="48" r="1" fill="#e8960a" opacity="0.22"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8960a"/>
      <stop offset="100%" stop-color="#120a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowstroke" x1="60" y1="10" x2="60" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5b830"/>
      <stop offset="100%" stop-color="#c07010"/>
    </linearGradient>
    <linearGradient id="arrowface" x1="60" y1="14" x2="60" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5b830"/>
      <stop offset="100%" stop-color="#120a00" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
