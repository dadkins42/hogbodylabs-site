<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2510"/>
      <stop offset="100%" stop-color="#221508"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0a04"/>
      <stop offset="100%" stop-color="#080602"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TV chassis -->
    <rect x="112" y="240" width="800" height="520" rx="72" fill="#180e04"/>
    <rect x="112" y="240" width="800" height="520" rx="72" fill="none" stroke="#d08020" stroke-width="14"/>

    <!-- Screen bezel recess -->
    <rect x="152" y="282" width="660" height="398" rx="44" fill="url(#screenGrad)"/>

    <!-- Scanlines -->
    <line x1="152" y1="330" x2="812" y2="330" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="386" x2="812" y2="386" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="442" x2="812" y2="442" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="498" x2="812" y2="498" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="554" x2="812" y2="554" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="610" x2="812" y2="610" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>
    <line x1="152" y1="666" x2="812" y2="666" stroke="#f0a010" stroke-opacity="0.07" stroke-width="4"/>

    <!-- Big question mark -->
    <text x="512" y="668"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="420"
          font-weight="700"
          fill="#f0a030">?</text>

    <!-- Antennas — angled inward, tips inside boundary -->
    <line x1="348" y1="240" x2="192" y2="108" stroke="#d08020" stroke-width="18" stroke-linecap="round"/>
    <line x1="676" y1="240" x2="832" y2="108" stroke="#d08020" stroke-width="18" stroke-linecap="round"/>
    <!-- Antenna tip dots -->
    <circle cx="192" cy="108" r="28" fill="#f0a030"/>
    <circle cx="832" cy="108" r="28" fill="#f0a030"/>

    <!-- Bottom control bar -->
    <rect x="112" y="760" width="800" height="110" rx="44" fill="#0e0804"/>
    <rect x="112" y="760" width="800" height="110" rx="44" fill="none" stroke="#7a4808" stroke-width="5"/>

    <!-- Knobs on bar -->
    <circle cx="780" cy="815" r="34" fill="#1e1008" stroke="#d08020" stroke-width="7"/>
    <circle cx="680" cy="815" r="34" fill="#1e1008" stroke="#d08020" stroke-width="7"/>

    <!-- Stand legs -->
    <rect x="370" y="870" width="52" height="90" rx="18" fill="#d08020"/>
    <rect x="602" y="870" width="52" height="90" rx="18" fill="#d08020"/>
    <!-- Stand base -->
    <rect x="326" y="952" width="372" height="38" rx="19" fill="#7a4808"/>

  </g>
</svg>
