<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Jonti Siman</title>
  <meta name="description" content="Jonti Siman — upright &amp; electric bassist. Live shows, music, and booking.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="topnav">
    <a class="brand" href="#top" id="artist-name">Artist</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
    <div class="nav-links" id="site-nav">
      <a href="#shows">Shows</a>
      <a href="#music">Music</a>
      <a href="#bands">Projects</a>
      <a href="#about">About</a>
      <a href="#booking">Booking</a>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero" id="top">
    <div class="hero-img" id="hero-img"></div>
    <div class="hero-inner">
      <h1 id="artist-name-hero" class="hero-name">&nbsp;</h1>
      <p class="hero-tagline" id="artist-tagline"></p>
      <a class="next-show" id="next-show" href="#shows"></a>
    </div>
  </header>

  <main>

    <!-- Shows — the centerpiece -->
    <section class="section" id="shows">
      <div class="section-inner">
        <h2 class="section-title">Shows</h2>
        <div id="shows-list" class="shows-list">
          <p class="empty-state">Loading shows…</p>
        </div>
      </div>
    </section>

    <!-- Music -->
    <section class="section alt" id="music">
      <div class="section-inner">
        <h2 class="section-title">Music</h2>
        <div id="music-list" class="music-grid"></div>
      </div>
    </section>

    <!-- Projects / Bands -->
    <section class="section" id="bands">
      <div class="section-inner">
        <h2 class="section-title">Projects</h2>
        <div id="bands-list" class="bands-grid"></div>
      </div>
    </section>

    <!-- About -->
    <section class="section alt" id="about">
      <div class="section-inner about-inner">
        <img class="about-img" id="about-img" alt="">
        <div class="about-text">
          <h2 class="section-title">About</h2>
          <div id="artist-bio"></div>
        </div>
      </div>
    </section>

    <!-- Booking / Contact -->
    <section class="section booking" id="booking">
      <div class="section-inner">
        <h2 class="section-title">Booking &amp; Contact</h2>
        <p class="booking-line">For booking, press, or to say hello:</p>
        <a class="booking-email" id="booking-link" href="#"></a>
        <div class="socials" id="socials"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <span>&copy; <span id="year">2026</span> <span id="artist-name-footer">Artist</span></span>
  </footer>

  <script src="js/site.js"></script>
</body>
</html>
